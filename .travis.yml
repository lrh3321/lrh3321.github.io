language: node_js
node_js:
  - "node"
install:
  - npm install
  - git submodule update --remote
script:
  - hexo generate
after_script:
  - cd ./public
  - git init
  - git config user.name "lrh3321"
  - git config user.email "lrh3321@gmail.com"
  - git add .
  - git commit -m "Update docs"
  - git push --force --quiet "https://${GH_TOKEN}@${GH_REF}" master:master
# E: Build LifeCycle

branches:
  only:
    - blog-source
env:
  global:
    - GH_REF: "github.com/lrh3321/lrh3321.github.io.git"
cache:
  directories:
    - "node_modules"
    - "public"
